type TreasuryAccount {
  id: ID!
  name: String!
  type: AccountType!
  balance: Money!
  createdAt: String!
  updatedAt: String!
}

type TreasuryDebt {
  id: ID!
  accountId: String!
  label: String!
  principal: Money!
  balance: Money!
  interestRate: Float!
  minimumPayment: Money!
  payoffTarget: String
  createdAt: String!
  updatedAt: String!
}

type Money {
  amount: Int!
  currency: Currency!
}

enum AccountType {
  bank
  credit_card
  loan
  investment
  cash
}

enum Currency {
  MNT
  USD
  EUR
}

type TreasuryQuery {
  accounts: [TreasuryAccount!]!
  debts: [TreasuryDebt!]!
}

input CreateAccountInput {
  name: String!
  type: AccountType!
  balanceAmount: Int!
  currency: Currency!
}

input CreateDebtInput {
  accountId: ID!
  label: String!
  principalAmount: Int!
  currency: Currency!
  interestRate: Float!
  minimumPaymentAmount: Int!
  payoffTarget: String
}

type TreasuryMutation {
  createAccount(input: CreateAccountInput!): TreasuryAccount!
  createDebt(input: CreateDebtInput!): TreasuryDebt!
  makeDebtPayment(debtId: ID!, amount: Int!, currency: Currency!): Boolean!
}
